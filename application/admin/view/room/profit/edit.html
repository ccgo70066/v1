<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Room_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-room_id" data-rule="required" min="0" data-source="room/index" class="form-control selectpage" name="row[room_id]" type="text" value="{$row.room_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Val')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-val" min="0" class="form-control" step="0.01" name="row[val]" type="number" value="{$row.val|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Reward_val')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-reward_val" class="form-control" step="0.01" name="row[reward_val]" type="number" value="{$row.reward_val|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Used_reward_val')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-used_reward_val" class="form-control" step="0.01" name="row[used_reward_val]" type="number" value="{$row.used_reward_val|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
