<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">关闭房间:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::radios('close', ['1'=>'强制关闭', '0'=>'不做处理'], '0', ['data-rule'=>'required'])}
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Forbidden_start_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-forbidden_start_time" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[forbidden_start_time]" type="text" value="{$row.forbidden_start_time}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Forbidden_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-forbidden_time" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[forbidden_time]" type="text" value="{$row.forbidden_time}">
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
