<div class="panel panel-default panel-intro">

    <div class="panel-heading">
        {:build_heading(null,FALSE)}
        <ul class="nav nav-tabs" data-field="status">
            <li class="active"><a href="#t-all" data-value="" data-toggle="tab">{:__('All')}</a></li>
            {foreach name="statusList" item="vo"}
            <li><a href="#t-{$key}" data-value="{$key}" data-toggle="tab">{$vo}</a></li>
            {/foreach}
        </ul>
    </div>


    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}" data-force-refresh="false" ><i class="fa fa-refresh"></i> </a>
<!--                         <a href="room/room/create"  class="btn btn-dialog btn-success btn-lucky {:$auth->check('room/room/create')?'':'hide'}"  data-name="log" title="创建房间" >创建房间</a> -->


                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('room/room/edit')}"
                           data-operate-del="{:$auth->check('room/room/del')}"
                           data-operate-delete="{:$auth->check('room/room/del')}"
                           data-operate-master_log="{:$auth->check('room/room/master_log')}"
                           data-operate-update_beautiful="{:$auth->check('room/room/update_beautiful')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
