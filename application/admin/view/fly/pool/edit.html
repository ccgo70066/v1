<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" name="row[title]" type="text" value="{$row.title|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Range_start')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-range_start" data-rule="" class="form-control" step="0.01" name="row[range_start]" type="number" value="{$row.range_start|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Range_end')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-range_end" data-rule="" class="form-control" step="0.01" name="row[range_end]" type="number" value="{$row.range_end|htmlentities}">

            <div class="margin" style="margin-left:0;">
                <div class="alert alert-dismissable bg-info">
                    <button type="button" class="close" data-dismiss="alert">×</button>
                    <strong>范围起止说明:</strong>  当前调控所包含的范围[范围起 <= 用户数值 < 范围止]<br>
                    <strong>示例如下:</strong><br>
                    <strong>范围起为空,范围止为1000</strong> : 用户数值小于1000时生效 <br>
                    <strong>范围起为1000,范围止为10000</strong> : 用户数值大于等于1000并小于10000时生效 <br>
                    <strong>范围起10000,范围止为空</strong> : 用户数值大于等于10000时生效
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" data-rule="required" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
