<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Code')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-code" data-rule="required" class="form-control"  onkeyup="this.value=this.value.replace(/[^\w_-]/g,'');"  name="row[code]" type="text" value="{$row.code|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-price" data-rule="required" class="form-control" step="0.01" name="row[price]" type="number" value="{$row.price|htmlentities}">
        </div>
    </div>


    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-amount" data-rule="required" class="form-control" name="row[amount]" type="number" value="{$row.amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('额外赠送钻石')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-give_amount" data-rule="required" class="form-control" name="row[give_amount]" type="number" value="{$row.give_amount|default=0}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('扩展编码')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-item_code" data-rule="" class="form-control" name="row[item_code]" type="text" value="{$row.item_code|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('System')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select id="c-system" data-rule="required" class="form-control selectpicker" name="row[system]">
                {foreach name="systemList" item="vo"}
                <option value="{$key}" {in name="key" value="$row.system"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Bage')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-bage" data-rule="required" class="form-control selectpicker" name="row[bage]">
                {foreach name="bageList" item="vo"}
                    <option value="{$key}" {in name="key" value="$row.bage"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>

    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" data-rule="required" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">

            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
