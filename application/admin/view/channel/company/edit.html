<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <h4>公司信息</h4>
    <hr>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required"  placeholder="命名规则: 商户名-支付公司"  class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Code')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-code" data-rule="required"  placeholder="唯一标识CODE"   onkeyup="this.value=this.value.replace(/[^\w_-]/g,'');" class="form-control" name="row[code]" type="text" value="{$row.code|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Contacts')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-contacts" class="form-control" name="row[contacts]" type="text" value="{$row.contacts|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Contacts_way')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-contacts_way" class="form-control" name="row[contacts_way]" type="text" value="{$row.contacts_way|htmlentities}">
        </div>
    </div>
    <h4>配置信息</h4>
    <hr>

            <input id="c-app_id" data-rule=""  placeholder="原生支付的appid"  onkeyup="this.value=this.value.replace(/[^\w_-;]/g,'');" class="form-control" name="row[app_id]" type="text" value="{$row.app_id|htmlentities}">
        </div>

        <label class="required control-label col-xs-12 col-sm-2">{:__('Notify_url')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-notify_url" placeholder="除苹果Pay以外,都必填" class="form-control" name="row[notify_url]" type="text" value="{$row.notify_url|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Return_url')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-return_url" class="form-control" placeholder="H5支付时成功页面"   name="row[return_url]" type="text" value="{$row.return_url|htmlentities}">
        </div>
    </div>

        <label class="control-label col-xs-12 col-sm-2">{:__('Sign_type')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-sign_type" class="form-control selectpicker" name="row[sign_type]">
                {foreach name="signTypeList" item="vo"}
                <option value="{$key}" {in name="key" value="$row.sign_type"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('扩展字段1')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-extend1"  class="form-control"  placeholder=""  name="row[extend1]" type="text" value="{$row.extend1|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('扩展字段2')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-extend2"  class="form-control"  placeholder=""  name="row[extend2]" type="text" value="{$row.extend2|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Comment')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-comment" class="form-control " rows="5" name="row[comment]" cols="50">{$row.comment|htmlentities}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">

            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
