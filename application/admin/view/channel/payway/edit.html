
<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Company_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-company_id" readonly data-rule="required" data-source="channel/company/index" class="form-control selectpage" name="row[company_id]" type="text" value="{$row.company_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Pay_way')}:</label>
        <div class="col-xs-12 col-sm-8">

            <input id="c-pay_way_id" readonly data-rule="required" data-source="pay/way/index" class="form-control selectpage" name="row[pay_way_id]" type="text" value="{$row.pay_way_id|htmlentities}">

        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[pay_name]" type="text" value="{$row.pay_name|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('App_pay_name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-app_pay_name" data-rule="required" class="form-control" name="row[app_pay_name]" type="text" value="{$row.app_pay_name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Open_way')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-open_way" data-rule="required" class="form-control selectpicker" name="row[open_way]">
                {foreach name="openWayList" item="vo"}
                    <option value="{$key}" {in name="key" value="$row.open_way"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>


    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('System')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-card_system" data-rule="required" class="form-control selectpicker" name="row[card_system]">
                {foreach name="systemList" item="vo"}
                <option {in name="key" value="$row.card_system"}selected{/in} value="{$key}">{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>


    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Card_ids')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-card_ids" readonly data-rule="required" data-source="channel/card/get_card_by_system" data-multiple="true"
                   data-field="price"
                   class="form-control selectpage" name="row[card_ids]" type="text" value="{$row.card_ids|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" data-rule="required" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
