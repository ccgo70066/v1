<link rel="stylesheet" type="text/css" href="/assets/resource/transfer/style.css">
<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text"
                   value="{$row.name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2">{:__('Appid')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-appid" data-rule="required" {if empty($row.appid) ==false}readonly{/if} class="form-control" name="row[appid]" type="text"
                   value="{$row.appid|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="required control-label col-xs-12 col-sm-2" style="margin-right:15px">支付渠道:</label>
        <div class="ty-transfer mt20 ml20">
            <div class="fl ty-transfer-list transfer-list-left" style="padding-left:15px">
                <div class="ty-transfer-list-head">
                    支付公司

                </div>

                <div class="ty-transfer-list-body">
                    <ul class="ty-tree-select">
                        {foreach name="companyList" item="vo"}
                        <li class="company">
                            <div class="ty-tree-div">
                                <label class="tyue-checkbox-wrapper">
                            <span class="tyue-checkbox">
                                <input type="checkbox" name="company_input" {if
                                       condition="!empty($vo.is_checked) ==true" }checked="checked" {/if}
                                class="" value="{$vo.id}">
                            </span>
                                    <span class="tyue-checkbox-txt" title="{$vo.name}">

                                {$vo.name}
                            </span>
                                </label>
                            </div>
                        </li>
                        {/foreach}


                    </ul>
                </div>
            </div>
            <div class="fl ty-transfer-operation">
                <span class="ty-transfer-btn-toright to-switch"></span>
            </div>
            <div class="fl ty-transfer-list transfer-list-right">
                <div class="ty-transfer-list-head">
                    支付渠道
                </div>
                <div class="ty-transfer-list-body pay_channel">
                    <ul class="ty-tree-select ddd">
                        <!--ajax获取-->
                        {foreach name="paywayList" item="vo"}
                        <li class="company_{$vo.company_id}">
                            <div className="ty-tree-div">
                                <label className="tyue-checkbox-wrapper">
                                    <span className="tyue-checkbox">
                                        <input type="checkbox" name="row[payway][]" value="{$vo.id}" {if
                                               condition="!empty($vo.is_checked) ==true" }checked="checked" {/if} className="tyue-checkbox-input">
                                        </span>
                                    <span className="tyue-checkbox-txt" title="' + value.pay_name + '">
                                        {$vo.pay_name}
                                    </span>
                                </label>
                            </div>
                        </li>
                        {/foreach}
                    </ul>
                </div>

            </div>
            <div class="clearboth">
            </div>
        </div>
    </div>

    <!--    <div class="form-group">-->
    <!--        <label class="control-label col-xs-12 col-sm-2">{:__('支付公司')}:</label>-->
    <!--        <div class="col-xs-12 col-sm-8">-->

    <!--                   class="form-control selectpage" name="" type="text" value="">-->

    <!--        <label class="required control-label col-xs-12 col-sm-2">{:__('payway')}:</label>-->
    <!--        <div class="col-xs-12 col-sm-8">-->

    <!--                   class="form-control selectpage" name="row[payway]" type="text"-->

    <!--                   data-primary-key="id" data-field="pay_name" data-multiple="true" value="{$row.payway|htmlentities}">-->
    <!--        </div>-->
    <!--    </div>-->

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Comment')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-comment" class="form-control " rows="5" name="row[comment]" cols="50">{$row.comment|htmlentities}</textarea>
        </div>
    </div>

<!--    <div class="form-group">-->
<!--        <label class="required control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>-->
<!--        <div class="col-xs-12 col-sm-8">-->
<!--            <input id="c-weigh" data-rule="required" data-rule="required" class="form-control" name="row[weigh]"-->
<!--                   type="number" value="{$row.weigh|htmlentities}">-->
<!--        </div>-->
<!--    </div>-->

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">

            <div class="radio">
                {foreach name="statusList" item="vo"}
                <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio"
                                                       value="{$key}" {in name="key" value="$row.status|default=''" }checked{/in}
                    /> {$vo}</label>
                {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

<script src="/assets/resource/transfer/jquery.min.js"></script>

<script>


    jQuery(document).ready(function ($) {
        /*
        * 按钮点击 start
        * */

        $(".company input").click(function () {
            var company_ids = $(this).val();
            if ($(this).prop('checked') == false) {
                $('.company_'+company_ids).remove();
                return;
            }
            $.ajax({
                type: 'POST',
                url: '{:url("channel/payway/get_payway_by_company")}',//查询
                data: {company_ids: company_ids},
                async: true,
                success: function (data) {

                    if (data.code != 1) {
                        Layer.msg('查询失败');
                        return;
                    }
                    var str = '';
                    if (data.data != false) {
                        $.each(data.data, function (n, value) {
                            str += '<li class="company_'+company_ids+'">';
                            str += '<div className="ty-tree-div">';
                            str += '<label>';
                            str += '<span className="tyue-checkbox">';
                            str += '<input type="checkbox" name="row[payway][]" value="' + value.id + '">';
                            str += '</span>';
                            str += '    <span className="tyue-checkbox-txt" title="' + value.pay_name + '">';
                            str += value.pay_name;
                            str += '</span>';
                            str += '</label>';
                            str += '</div>';
                            str += '</li>';
                        });
                    }
                    $('.ddd').append(str);
                },
                error: function (data) {
                    Layer.msg('请求失败');
                }
            });
        });
    });

</script>
