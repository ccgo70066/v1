<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <input type="hidden" name="row[box_type]" value="{$Request.param.box_type}">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Box_type')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-box_type" class="form-control selectpicker" name="row[box_type]" disabled>
                {foreach name="boxTypeList" item="vo"}
                <option value="{$key}" {in name="key" value="$Request.param.box_type"}selected{/in} >{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('升级礼物')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-gift_id" data-rule="" data-source="egg/gift/get_gift" class="form-control selectpage"
                   name="row[upgrade_gift_ids]" type="text" value="{$row.upgrade_gift_ids|htmlentities}"
                   data-multiple="true" data-params='{"custom[box_type]":{$Request.param.box_type}}'
            >

            <div class="margin" style="margin-left:0;">
                <div class="alert alert-dismissable bg-info">
                    <button type="button" class="close" data-dismiss="alert">×</button>
                    用户小于当前分级时获取升级礼物中的一个即可升级到当前分级
                    <br>
                    <strong class="text-red">注:</strong> 分级大小使用排序字段区分, 值越大分级越高

                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_sys_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_sys_percent" class="form-control" step="0.01" name="row[pool_sys_percent]" type="number" value="{$row.pool_sys_percent|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_pubn_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_pubn_percent" class="form-control" step="0.01" name="row[pool_pubn_percent]" type="number" value="{$row.pool_pubn_percent|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_pub_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_pub_percent" class="form-control" step="0.01" name="row[pool_pub_percent]" type="number" value="{$row.pool_pub_percent|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_per_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_per_percent" class="form-control" step="0.01" name="row[pool_per_percent]" type="number" value="{$row.pool_per_percent|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Or_data')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="orDataList" item="vo"}
            <label for="row[or_data]-{$key}"><input id="row[or_data]-{$key}" name="row[or_data]" type="radio" value="{$key}" {in name="key" value="$row.or_data??1"}checked{/in} /> {$vo}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_data')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="checkbox">
            {foreach name="jumpDataList" item="vo"}
            <label for="row[jump_data][]-{$key}"><input id="row[jump_data][]-{$key}" name="row[jump_data][]" type="checkbox" value="{$key}" {in name="key" value="$row.jump_data"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" class="form-control" name="row[weigh]" type="number" data-rule="required" value="{$row.weigh|htmlentities}">
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
