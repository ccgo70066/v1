<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Box_type')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-box_type" data-rule="required" class="form-control selectpicker" name="row[box_type]">
                {foreach name="boxTypeList" item="vo"}
                    <option value="{$key}" {in name="key" value=""}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Range_start')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-range_start" class="form-control" name="row[range_start]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Range_end')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-range_end" class="form-control" name="row[range_end]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_sys_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_sys_percent" class="form-control" step="0.01" name="row[pool_sys_percent]" type="number" value="0.00">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_pub_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_pub_percent" class="form-control" step="0.01" name="row[pool_pub_percent]" type="number" value="0.00">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pool_per_percent')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pool_per_percent" class="form-control" step="0.01" name="row[pool_per_percent]" type="number" value="0.00">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Or_data')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="orDataList" item="vo"}
            <label for="row[or_data]-{$key}"><input id="row[or_data]-{$key}" name="row[or_data]" type="radio" value="{$key}" {in name="key" value="1"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_data')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="checkbox">
            {foreach name="jumpDataList" item="vo"}
            <label for="row[jump_data][]-{$key}"><input id="row[jump_data][]-{$key}" name="row[jump_data][]" type="checkbox" value="{$key}" {in name="key" value=""}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_percent_1')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-jump_percent_1" class="form-control" step="0.01" name="row[jump_percent_1]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_percent_2')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-jump_percent_2" class="form-control" step="0.01" name="row[jump_percent_2]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_percent_3')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-jump_percent_3" class="form-control" step="0.01" name="row[jump_percent_3]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Jump_percent_4')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-jump_percent_4" class="form-control" step="0.01" name="row[jump_percent_4]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" class="form-control" name="row[weigh]" type="number">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Create_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-create_time" data-rule="required" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[create_time]" type="text" value="{:date('Y-m-d H:i:s')}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Update_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-update_time" data-rule="required" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[update_time]" type="text" value="{:date('Y-m-d H:i:s')}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
