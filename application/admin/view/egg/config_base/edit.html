<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <input type="hidden" name="row[box_type]" value="{$Request.param.box_type}">
    <input type="hidden" name="row[count_type]" value="{$Request.param.count_type}">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Box_type')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-box_type" class="form-control selectpicker" name="row[box_type]" disabled>
                {foreach name="boxTypeList" item="vo"}
                <option value="{$key}" {in name="key" value="$Request.param.box_type"}selected{/in} >{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Count_type')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-count_type" data-rule="required" class="form-control selectpicker" name="row[count_type]" disabled>
                {foreach name="countTypeList" item="vo"}
                <option value="{$key}" {in name="key" value="$Request.param.count_type"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" class="form-control" data-rule="required" name="row[title]" type="text" value="{$row.title|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Level_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-level_id" data-rule="required" data-source="egg/level/index"
                   data-params='{"custom[box_type]":{$Request.param.box_type}}'
                   class="form-control selectpage" name="row[level_id]" type="text" value="{$row.level_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Count')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-count" class="form-control" data-rule="required;integer(+)" name="row[count]" type="number" value="{$row.count|htmlentities}">
        </div>
    </div>
    {eq name="$Request.action" value="edit"}
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Config')}:</label>
        <div class="col-xs-12 col-sm-8">
            <dl class="fieldlist" data-name="row[config]" data-template="testtpl">
                <dd>
                    <ins style="margin-left: 40px">礼物名称</ins>
                    <ins>价格</ins>
                    <ins>权重</ins>
                </dd>
                <dd>
                    <a href="javascript:;" class="btn btn-sm btn-success btn-append hidden"><i class="fa fa-plus"></i> 追加</a>
                </dd>
                <textarea name="row[config]" class="form-control hide" cols="30" rows="5">{$row.config}</textarea>
            </dl>

            <!--定义模板-->
            <script type="text/javascript" id="testtpl">
                <dd class="form-inline">
                    <img src="<%=row['image_url']%>" style="width: 30px; height: 30px;" alt="">
                    <input type="text" name="row[<%=name%>][<%=index%>][name]" class="form-control" value="<%=row['name']%>" size="10" readonly>
                <input type="text" name="row[<%=name%>][<%=index%>][price]" class="form-control" value="<%=row['price']%>" size="10" class="hidden" readonly>

                <input type="text" onKeyUp="value=Fast.float_limit(value)" name="row[<%=name%>][<%=index%>][weight]" class="form-control" value="<%=row['weight']%>" size="10">

                    <input type="hidden" name="row[<%=name%>][<%=index%>][id]" class="form-control" value="<%=row['id']%>" size="10" readonly>
                <input type="hidden" name="row[<%=name%>][<%=index%>][image]" class="form-control" value="<%=row['image']%>" size="0" class="hidden" readonly>
                </dd>
            </script>



        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Ignore_1th')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-ignore_1th" class="form-control" step="0.01" name="row[ignore_1th]" type="number" value="{$row.ignore_1th|htmlentities}">
        </div>
    </div>


    {/eq}
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status??1"}checked{/in} /> {$vo}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
