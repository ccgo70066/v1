<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[amount]" type="number" value="{$row.amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Lock_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-lock_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[lock_amount]" type="number" value="{$row.lock_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Reward_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-reward_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[reward_amount]" type="number" value="{$row.reward_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pledge_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pledge_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[pledge_amount]" type="number" value="{$row.pledge_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Integral')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-integral" data-rule="required" class="form-control" step="0.01" name="row[integral]" type="number" value="{$row.integral|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Level')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-level" data-rule="required" class="form-control" name="row[level]" type="number" value="{$row.level|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Recharge_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-recharge_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[recharge_amount]" type="number" value="{$row.recharge_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Rewarded_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rewarded_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[rewarded_amount]" type="number" value="{$row.rewarded_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Payword')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-payword" data-rule="required" class="form-control" name="row[payword]" type="text" value="{$row.payword|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Safe_code')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-safe_code" class="form-control" name="row[safe_code]" type="text" value="{$row.safe_code|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Shred')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-shred" min="0" class="form-control" name="row[shred]" type="number" value="{$row.shred|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Proom_no')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-proom_no" min="0" class="form-control" name="row[proom_no]" type="number" value="{$row.proom_no|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Union_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-union_id" min="0" data-rule="required" data-source="union/index" class="form-control selectpage" name="row[union_id]" type="text" value="{$row.union_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Create_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-create_time" data-rule="required" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[create_time]" type="text" value="{$row.create_time}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Update_time')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-update_time" data-rule="required" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[update_time]" type="text" value="{$row.update_time}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
