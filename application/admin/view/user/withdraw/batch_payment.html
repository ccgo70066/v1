
<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    
    <div class="form-group" style="margin-top: 20px">
        <label class="control-label col-xs-12 col-sm-2">{:__('打款方式')}:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control" readonly="readonly">线下打款</p>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('打款手续费')}:</label>
        <div class="col-xs-12 col-sm-8">

        {:Form::text('row[payment_fee]', 2, ['data-rule'=>'required', 'placeholder'=>'打款手续费'])}
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('备注')}:</label>
        <div class="col-xs-12 col-sm-8">

            {:Form::textarea('row[comment]', $str??'', ['data-rule'=>'required', 'placeholder'=>'请输入原因备注', 'rows'=>2])}
        </div>
    </div>
    </fieldset>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-4">
            <button type="submit" class="btn btn-success btn-embossed">{:__('提交')}</button>
        </div>
    </div>
</form>
