<style>
    legend {
        font-size: 16px;
        color: green;
    }
</style>
<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    {if isset($row['bank_number'])}
    <fieldset>
        <legend>銀行卡信息</legend>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">真實姓名:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text"
                       value="{$row.account_name}">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">卡號:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text"
                       value="{$row.bank_number}">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">開戶銀行:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text"
                       value="{$row.bank_name}">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">開戶分行:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text"
                       value="{$row.branch_name}">
            </div>
        </div>

    </fieldset>
    {else}
    <fieldset>
        <legend>支付宝信息</legend>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">支付宝实名:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text" value="{$row.alipay_name}">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">支付宝账号:</label>
            <div class="col-xs-10 col-sm-8">
                <input  class="form-control" readonly="readonly" name="id" type="text" value="{$row.alipay_number}">
            </div>
        </div>
    </fieldset>
    {/if}

</form>
