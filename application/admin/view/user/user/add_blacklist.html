<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户ID:</label>
         <div class="col-xs-12 col-sm-8">
            <input id="c-idno" data-rule="required" class="form-control" name="uid" type="text"  readonly="readonly" value="{$row.id}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户:</label>
         <div class="col-xs-12 col-sm-8">
            <input id="c-nick" class="form-control" readonly="readonly"  name="nick" type="text" value="{$row.nickname}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">封禁选项:</label>
         <div class="col-xs-12 col-sm-8">
             {:Form::checkboxs('row[type]', $type_range, '1,2,3', ['data-rule'=>'required'])}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">封禁时间:</label>
         <div class="col-xs-12 col-sm-8">
            {:Form::radios('row[days]', $date_range, 3650, ['data-rule'=>'required'])}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">提示类型:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::radios('row[form]', $form_range, '2', ['data-rule'=>'required'])}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">备注:</label>
         <div class="col-xs-12 col-sm-8">
            {:Form::textarea('row[comment]', '非法用户')}
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-4">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
