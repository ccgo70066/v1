<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <input type="hidden" name="row[user_id]" value="{$row.id}">
    <input type="hidden" name="row[orig_appid]" value="{$row.appid}">
    <input type="hidden" name="row[admin_operator]" value="{:session('admin.id')}">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('用户ID')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user_id" data-rule="required" class="form-control" name="row[user_id]" type="text"
                   value="{$row.id}" disabled/>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('行为')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="a" class="form-control" type="text" value="{$text}" disabled>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('操作员')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="" class="form-control" type="text" value="{:session('admin.nickname')}" disabled>
        </div>
    </div>
<!--    <div class="form-group">-->
<!--        <label class="control-label col-xs-12 col-sm-2">{:__('备注')}:</label>-->
<!--        <div class="col-xs-12 col-sm-8">-->
<!--            <textarea id="c-comment" class="form-control " rows="3" name="row[comment]" cols="50"-->
<!--                      placeholder="请输入用户渠道修改原因进行备注"-->
<!--            ></textarea>-->
<!--        </div>-->
<!--    </div>-->
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
