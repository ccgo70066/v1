<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户ID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-idno" data-rule="required" class="form-control" name="row[user_id]" type="text"  readonly="readonly" value="{$row.id}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-nick" class="form-control" readonly="readonly"  name="nick" type="text" value="{$row.nickname}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">增加收益:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::input('number', 'row[reward_amount]', '', ['data-rule'=>'required', 'onmousewheel'=>"return false;"])}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('操作原因')}:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::textarea('row[comment]', '', ['data-rule'=>'required', 'id'=>'comment', 'placeholder'=>'请输入操作原因', 'rows'=>2])}
            <button class="btn btn-info" onclick="$('#comment').val($(this).html());return false;">系统补偿</button>
            <button class="btn btn-info" onclick="$('#comment').val($(this).html());return false;">活动奖励</button>
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-4">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
