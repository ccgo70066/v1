<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh')}
                        <a href="user/business" class="btn btn-dialog btn-withdrawal btn-warning {:$auth->check('user/business/index')?'':'hide'}"  data-area='["90%","90%"]'  data-name="data" title="用户数据" >用户数据</a>
                        <a href="admin_option_log" class="btn btn-dialog btn-withdrawal btn-success {:$auth->check('admin_option_log/index')?'':'hide'}" data-area='["90%","90%"]'   data-name="log" title="运营日志" >运营日志</a>
                        <a href="javascript:;" class="btn btn-info btn-sum" id="sum_total_click" title="汇总"><i class="fa fa-line-chart"></i> {:__('汇总')}</a>

                        <a href="javascript:" >
                            <span class="extend">
                                <span class="text-black">(</span>
                                <span class="text-blue">在线人数:<span id="online_user">0</span></span>
                                <span class="text-black">)</span>
                            </span>
                        </a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('user/user/edit')}"
                           data-operate-del="{:$auth->check('user/user/del')}"
                           data-operate-detail="{:$auth->check('user/user/detail')}"
                           data-operate-add_amount="{:$auth->check('user/user/add_amount')}"
                           data-operate-remove_amount="{:$auth->check('user/user/remove_amount')}"
                           data-operate-update_beautiful_id="{:$auth->check('user/user/update_beautiful_id')}"
                           data-operate-add_noble="{:$auth->check('user/user/add_noble')}"
                           data-operate-add_reward="{:$auth->check('user/user/add_reward')}"
                           data-operate-add_blacklist="{:$auth->check('user/user/add_blacklist')}"
                           data-operate-remove_blacklist="{:$auth->check('user/user/remove_blacklist')}"

                           data-operate-clear_value="{:$auth->check('user/user/clear_value')}"
                           data-operate-set_illegal="{:$auth->check('user/user/set_illegal')}"
                           data-operate-business_log="{:$auth->check('user/business_log/index')}"
                           data-operate-recharge_log="{:$auth->check('user/recharge/index')}"
                           data-operate-update_password="{:$auth->check('user/user/update_password')}"
                           data-operate-update_appid="{:$auth->check('user/user/update_appid')}"
                           data-operate-clear_login_limit="{:$auth->check('user/user/clear_login_limit')}"
                           data-operate-reset_role="{:$auth->check('user/user/reset_role')}"

                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
