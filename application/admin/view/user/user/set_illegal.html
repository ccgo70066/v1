<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">


    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户昵称:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::checkboxs('row[checkbox]', [
            'nickname'=> $row['nickname'],
            ], '', ['data-rule'=>''])}
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">头像:</label>
        <div class="col-xs-12 col-sm-8">

            <ul class="row list-inline plupload-preview" style="text-align: center">
                <li class="col-xs-3">
                    <a href="{:cdnurl($row.avatar)}" target="_blank" class="thumbnail">
                        <img src="{:cdnurl($row.avatar)}" onerror="this.src='/m.php/ajax/icon?suffix=jpg';this.onerror=null;" class="img-responsive">
                    </a>
                    <div class="checkbox">
                        <label for="row[checkbox]-avatar">
                            <input data-rule="" id="row[checkbox]-avatar" name="row[checkbox][avatar]"
                                   type="checkbox" value="avatar">头像</label>
                    </div>
                </li>
            </ul>
        </div>
    </div>


    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">签名:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::checkboxs('row[checkbox]', [
            'bio'=> $row['bio'],
            ], '', ['data-rule'=>''])}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">操作备注:</label>
        <div class="col-xs-12 col-sm-8">
            {:Form::textarea('row[comment]', '', ['placeholder'=>'请输入操作备注'])}
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-4">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
