<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}" ><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="btn btn-info btn-sum " title="汇总"><i class="fa fa-line-chart"></i> {:__('汇总')}</a>


                        <a href="javascript:;" >
                            <span class="extend">
                                <span class="text-black"><span id=""></span></span>
                                <span class="text-black">(</span>
                                <span class="text-green">次数:<span id="total_count">0</span></span>
                                <span class="text-black">&nbsp;|&nbsp;</span>
                                <span class="text-blue">消费:<span id="total_used_amount">0</span></span>
                                <span class="text-black">&nbsp;|&nbsp;</span>
                                <span class="text-green">收益:<span id="total_gian_amount">0</span></span>
                                <span class="text-black">&nbsp;|&nbsp;</span>
                                <span class="text-green">比率:<span id="percent">0</span></span>
                                <span class="text-black">&nbsp;|&nbsp;</span>
                                <span class="text-green">盈亏:<span id="total_our_amount">0</span></span>
                                <span class="text-black">)</span>
                            </span>
                        </a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('wheel/log/edit')}"
                           data-operate-del="{:$auth->check('wheel/log/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
