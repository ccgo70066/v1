<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <input type="hidden" name="row[box_type]" value="1">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Gift_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-gift_id" data-rule="required" data-source="prop/gift/index" data-params='{"custom[type]":4}'
                   data-order-by="id asc, price asc"
                   class="form-control selectpage" name="row[gift_id]" type="text" value="{$row.gift_id|htmlentities}">
        </div>
    </div>


    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Master_gift_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-master_gift_id" data-rule=""  class="form-control" name="row[master_gift_id]" type="text" value="{$row.master_gift_id|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" data-rule="" class="form-control" name="row[weigh]" type="text" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Broadcast')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-broadcast" data-rule="required" class="form-control selectpicker" name="row[broadcast]">
                {foreach name="broadcastList" item="vo"}
                    <option value="{$key}" {in name="key" value="$row.broadcast"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Show_again')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select  id="c-show_again" data-rule="required" class="form-control selectpicker" name="row[show_again]">
                {foreach name="showAgainList" item="vo"}
                    <option value="{$key}" {in name="key" value="$row.show_again"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('万分比备注')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-show_rate" data-rule="" class="form-control" name="row[show_rate]" type="text" value="{$row.show_rate|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">

            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
