<div class="panel panel-default panel-intro">
    
    <div class="panel-heading">
        {:build_heading(null,FALSE)}
        <ul class="nav nav-tabs" data-field="status">
            <li class="{:$Think.get.status === null ? 'active' : ''}"><a href="#t-all" data-value="" data-toggle="tab">{:__('All')}</a></li>
            {foreach name="statusList" item="vo"}
            <li class="{:$Think.get.status === (string)$key ? 'active' : ''}"><a href="#t-{$key}" data-value="{$key}" data-toggle="tab">{$vo}</a></li>
            {/foreach}
        </ul>
    </div>


    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}"  data-force-refresh="false"><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('prop/gift/add')?'':'hide'}" title="{:__('Add')}" ><i class="fa fa-plus"></i> {:__('Add')}</a>
                        <a href="javascript:;" class="btn btn-success btn-push btn-disabled disabled {:$auth->check('gift/gift/push')?'':'hide'}" title="{:__('推送')}" ><i class="fa fa-arrow-right"></i> {:__('在线推送')}</a>
                        
                    </div>

                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('prop/gift/edit')}"
                           data-operate-del="{:$auth->check('prop/gift/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="demoCanvas" style="
/*width: 70%;*/
 height: 70%;
  position: absolute;
  left: 30px;
  top: 10px;
  z-index: 9999;
"></div>
<script src="/assets/libs_extend/svgaplayer-web-mp/build/svga.min.js"></script>
<script id="categorytpl" type="text/html">
    <div class="row">
        <div class="col-xs-12">
            <div class="form-inline" data-toggle="cxselect" data-selects="group,admin">
                <select class="group form-control" name="type" data-url="prop/gift/select_type" id="type"></select>
                <select class="admin form-control" name="cate" data-url="prop/gift/select_type" id="cate" data-query-name="type"></select>
                <input type="hidden" class="operate" data-name="type" value="="/>
                <input type="hidden" class="operate" data-name="cate" value="="/>
            </div>
        </div>
    </div>
</script>
